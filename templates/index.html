<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מחולל תעודות COC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
    }
    header {
      background: #1a2540;
      color: white;
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 18px; }
    header .user-info { font-size: 13px; color: #94a3b8; }
    header .user-info a {
      color: #60a5fa;
      text-decoration: none;
      margin-right: 12px;
    }
    header .user-info a:hover { text-decoration: underline; }
    .container {
      max-width: 520px;
      margin: 60px auto;
      padding: 0 16px;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 40px;
    }
    .card h2 {
      font-size: 20px;
      color: #1a2540;
      margin-bottom: 8px;
    }
    .card p {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 18px;
      letter-spacing: 1px;
      direction: ltr;
      text-align: center;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    .error {
      background: #fee2e2;
      color: #991b1b;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      margin-top: 16px;
    }
    button[type="submit"] {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    button[type="submit"]:hover { background: #1d4ed8; }
    button[type="submit"]:active { background: #1e40af; }
    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hint {
      text-align: center;
      font-size: 12px;
      color: #9ca3af;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Wise Electric — תעודות COC</h1>
    <div class="user-info">
      שלום, {{ user }}
      <a href="/logout">יציאה</a>
    </div>
  </header>

  <div class="container">
    <div class="card">
      <h2>יצירת תעודת התאמה</h2>
      <p>הכנס מק"ט של המוצר וקבל תעודת COC מעודכנת עם תאריך היום</p>

      <form method="POST" id="coc-form" onsubmit="handleSubmit()">
        <input type="hidden" name="coc_type" id="coc_type" value="standard">

        <label for="sku">מק"ט</label>
        <input
          type="text"
          id="sku"
          name="sku"
          placeholder="לדוגמה: 6905414"
          autofocus
          required
        >

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <div style="display:flex; gap:10px; margin-top:24px;">
          <button type="submit" id="submit-btn" onclick="setType('standard')" style="flex:1; padding:13px; background:#2563eb; color:white; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;">
            <span class="spinner" id="spinner"></span>
            <span id="btn-text">COC רגיל</span>
          </button>
          <button type="submit" id="submit-btn2" onclick="setType('with_standards')" style="flex:1; padding:13px; background:#0f766e; color:white; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;">
            <span class="spinner" id="spinner2"></span>
            <span id="btn-text2">COC עם תקנים</span>
          </button>
        </div>
      </form>

      <div class="hint">הקובץ יורד אוטומטית לאחר הלחיצה</div>
    </div>
  </div>

  <script>
    function setType(type) {
      document.getElementById('coc_type').value = type;
    }
    function handleSubmit() {
      const isStandards = document.getElementById('coc_type').value === 'with_standards';
      const spinnerId = isStandards ? 'spinner2' : 'spinner';
      const btnTextId = isStandards ? 'btn-text2' : 'btn-text';
      const btnId     = isStandards ? 'submit-btn2' : 'submit-btn';
      document.getElementById(spinnerId).style.display = 'block';
      document.getElementById(btnTextId).textContent = 'מייצר...';
      document.getElementById(btnId).disabled = true;
      setTimeout(() => {
        document.getElementById(spinnerId).style.display = 'none';
        document.getElementById(btnTextId).textContent = isStandards ? 'COC עם תקנים' : 'COC רגיל';
        document.getElementById(btnId).disabled = false;
      }, 5000);
    }
  </script>
</body>
</html>
